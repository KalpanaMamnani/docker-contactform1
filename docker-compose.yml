services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-contactform-app:latest}
    container_name: contactform-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-contactuser}
      DB_PASS: ${DB_PASS:-password}
      DB_NAME: ${DB_NAME:-contactdb}
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: contactform-db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-contactdb}
      MYSQL_USER: ${DB_USER:-contactuser}
      MYSQL_PASSWORD: ${DB_PASS:-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpassword}
    ports:
      - "${DB_EXPOSE_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${DB_ROOT_PASS:-rootpassword}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  db_data:
