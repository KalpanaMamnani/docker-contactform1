# This is a basic workflow to help you get started with Actions

name:  Build and Push Docker Image

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build app image using docker-compose
      - name: Build app image
        run: |
          APP_IMAGE=${{ secrets.DOCKER_USERNAME }}/contactform-app:latest docker compose build app

      # 4. Push app image to Docker Hub
      - name: Push app image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/contactform-app:latest
